name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache golangci-lint
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: hack/tools
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('Makefile', 'go.sum') }}-v2.10.1
          restore-keys: |
            golangci-lint-${{ runner.os }}-

      - name: Install tools
        run: make tools

      - name: Verify imports and formatting
        run: make verify-imports

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: make build
